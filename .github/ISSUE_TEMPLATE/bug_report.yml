name: Bug report
description: Report reproducible incorrect behavior in latency-lab
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a problem.
  - type: input
    id: version
    attributes:
      label: latency-lab version
      placeholder: 1.2.0
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Runtime and framework
      placeholder: Node.js 22, Fastify 5
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the actual and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide code or a repository that reproduces the problem.
      render: typescript
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove credentials and private data before submitting.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: This report does not contain credentials or private data.
          required: true
