# This workflow will run tests using node and then publish a public package to npm.
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Node.js Package

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_type:
        description: Semantic version bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: npm-publish-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 18
          - 20
          - 24
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm test

  publish-npm:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false
      - run: npm ci

      - name: Publish with npm Trusted Publishing
        run: npm publish --access public
        env:
          VERSION_BUMP: ${{ github.event_name == 'workflow_dispatch' && inputs.release_type || contains(github.event.head_commit.message, '[major]') && 'major' || contains(github.event.head_commit.message, '[minor]') && 'minor' || 'patch' }}

      - name: Commit published version
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): v${version} [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(node -p "require('./package.json').version")
          gh release create "v${version}" \
            --target "$(git rev-parse HEAD)" \
            --title "v${version}" \
            --generate-notes
