# This workflow will run tests using node and then publish a package to npm using Trusted Publishers (OIDC)
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Node.js Package

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    
    # 1. Grant the required permissions for OIDC authentication
    permissions:
      id-token: write
      contents: read
      
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - run: npm ci
      
      # 2. Run npm publish without the NODE_AUTH_TOKEN environment variable
      - run: npm publish --provenance
